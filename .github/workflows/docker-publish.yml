name: Build and publish image

# Builds the single-image Docker build and publishes it to the GitHub
# Container Registry (GHCR). Uses the built-in GITHUB_TOKEN — no manual
# `docker login` and no personal access tokens required.
#
#   ghcr.io/<owner>/<repo>
#
# Two variants are published from the same Dockerfile:
#   :latest / :sha-<short> / :vX.Y.Z   the default image — ONNX Runtime + the
#                                      wd14 tagger baked in (~500MB)
#   :lean  / :lean-sha-<short>         cgo-free, no model, heuristic tags only
#
# Tagging:
#   - push to default branch -> :latest and :sha-<short>
#   - git tag vX.Y.Z          -> :vX.Y.Z (and :latest)
#
# NOTE: On the first successful run the GHCR package is created *private*.
# Make it public once at:
#   github.com/users/<owner>/packages/container/<repo>/settings  -> Danger Zone
# After that, Unraid pulls it with no authentication.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Gate the push on the tests. A broken tagger that only fails at first
  # inference is exactly the kind of thing that is miserable to debug on Unraid.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      # The thumbnail and video-frame tests skip themselves without ffmpeg, and a
      # skipped test gates nothing.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      # Both build tags: the lean path and the onnx path compile different files.
      # The onnx unit tests do not need the shared library — it is dlopen'd only
      # when a session is created, and TestRealModel skips without a model dir.
      - name: Test (lean)
        working-directory: backend
        run: CGO_ENABLED=1 go test -race ./...

      - name: Test (onnx)
        working-directory: backend
        run: CGO_ENABLED=1 go test -race -tags onnx ./...

  # The Android client is built here, not just in android.yml, so that the APK the
  # server hands out is the one built from the same commit as the server itself.
  # It has to be its own job: the docker job deletes /usr/local/lib/android to make
  # room for the ONNX model, which would take the SDK out from under a Gradle build.
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      # The Gradle wrapper jar is not committed, so there is no ./gradlew to run.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Derive version
        id: version
        run: |
          name="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            name="0.0.0-${GITHUB_SHA::7}"
          fi
          # Must match android.yml exactly: Android compares this integer before it
          # considers replacing an installed package.
          code="$(git show -s --format=%ct HEAD)"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"

      # The image must never silently ship a one-use debug APK. Every hosted runner
      # creates a different debug key, so the next image's APK cannot update it.
      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No persistent Android signing key: publishing the server image without an APK." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > "${RUNNER_TEMP}/oppailib.jks"
          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "path=${RUNNER_TEMP}/oppailib.jks" >> "$GITHUB_OUTPUT"

      - name: Build APK
        if: steps.keystore.outputs.present == 'true'
        working-directory: android
        env:
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.code }}
          ANDROID_KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle --no-daemon assembleRelease
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk
          mkdir -p "${RUNNER_TEMP}/apk"
          cp app/build/outputs/apk/release/app-release.apk "${RUNNER_TEMP}/apk/oppailib.apk"

      # Keep the image pipeline independent from Android signing. An empty artifact
      # directory cannot be uploaded, so use a harmless note when no signed APK exists.
      # The server ignores it and reports APK availability as false.
      - name: Prepare image payload without APK
        if: steps.keystore.outputs.present != 'true'
        run: |
          mkdir -p "${RUNNER_TEMP}/apk"
          echo "No signed APK was configured for this build." > "${RUNNER_TEMP}/apk/README.txt"

      - name: Upload APK for the image build
        uses: actions/upload-artifact@v4
        with:
          name: oppailib-apk
          path: ${{ runner.temp }}/apk/
          if-no-files-found: error

  docker:
    needs: [test, apk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Lands in the build context at docker/apk/. A signed oppailib.apk is served
      # from Settings; without a signing key the image still publishes, with no APK.
      - name: Fetch the APK
        uses: actions/download-artifact@v4
        with:
          name: oppailib-apk
          path: docker/apk

      # The onnx image bakes in a 378MB model on top of the ONNX Runtime and the
      # build cache. Hosted runners start with ~14GB free, which is enough only
      # after the preinstalled toolchain images are dropped.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (onnx)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name for GHCR automatically.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Docker metadata (lean)
        id: meta-lean
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # metadata-action automatically adds :latest for tag events unless this
          # is disabled. A tagged lean build must never overwrite the full ONNX
          # :latest image used by the Unraid template.
          flavor: |
            latest=false
          tags: |
            type=raw,value=lean,enable={{is_default_branch}}
            type=sha,format=short,prefix=lean-
            type=ref,event=tag,prefix=lean-

      # Build identity stamped into the binary so a running container can be
      # matched to source (surfaced at GET /api/health as "version").
      - name: Version stamp
        id: vars
        run: echo "version=${{ github.ref_name }}-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      # linux/amd64 only, deliberately: Microsoft ships the ONNX Runtime release
      # tarball as onnxruntime-linux-x64, so an arm64 build has no library to
      # bundle. Unraid is x86_64.
      - name: Build and push (onnx)
        id: build_onnx
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-onnx
          platforms: linux/amd64
          push: true
          build-args: |
            OPPAI_VERSION=${{ steps.vars.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=onnx
          cache-to: type=gha,scope=onnx,mode=max

      - name: Build and push (lean)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: true
          build-args: |
            OPPAI_VERSION=${{ steps.vars.outputs.version }}
          tags: ${{ steps.meta-lean.outputs.tags }}
          labels: ${{ steps.meta-lean.outputs.labels }}
          cache-from: type=gha,scope=lean
          cache-to: type=gha,scope=lean,mode=max

      # Fail loudly here rather than on the Unraid box. If the model or the ONNX
      # Runtime library were missing, NewManager quietly falls back to the
      # heuristic tagger — tagging would look "fine" while doing nothing. The
      # image reports the tagger it actually loaded at GET /api/health.
      - name: Smoke test the onnx image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build_onnx.outputs.digest }}
        run: |
          set -euo pipefail
          REF="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')@${DIGEST}"
          echo "smoke-testing $REF"

          docker run -d --name oppai-smoke \
            -e OPPAI_PASSPHRASE=smoke-test-passphrase \
            -e OPPAI_ADMIN_USER=admin -e OPPAI_ADMIN_PASSWORD=smoke-test-pw \
            -p 8080:8080 "$REF"

          ok=""
          for _ in $(seq 1 45); do
            if curl -fsS http://localhost:8080/api/health -o health.json 2>/dev/null; then ok=1; break; fi
            sleep 2
          done
          echo "--- container log ---"; docker logs oppai-smoke || true
          [ -n "$ok" ] || { echo "FAIL: /api/health never responded" >&2; exit 1; }
          echo "--- /api/health ---"; cat health.json; echo

          # e.g. {"aiEnabled":true,"aiTagger":"onnx:model.onnx:cpu",...}
          tagger=$(jq -r '.aiTagger' health.json)
          echo "aiTagger = $tagger"
          case "$tagger" in
            onnx:*) ;;
            *) echo "FAIL: expected an onnx tagger, got '$tagger'" >&2; exit 1 ;;
          esac
          [ "$(jq -r '.aiEnabled' health.json)" = "true" ] || {
            echo "FAIL: aiEnabled is false" >&2; exit 1; }

          docker rm -f oppai-smoke
