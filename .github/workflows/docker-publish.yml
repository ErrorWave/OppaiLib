name: Build and publish image

# Builds the single-image Docker build and publishes it to the GitHub
# Container Registry (GHCR). Uses the built-in GITHUB_TOKEN — no manual
# `docker login` and no personal access tokens required.
#
#   ghcr.io/<owner>/<repo>
#
# Tagging:
#   - push to default branch -> :latest and :sha-<short>
#   - git tag vX.Y.Z          -> :vX.Y.Z (and :latest)
#
# NOTE: On the first successful run the GHCR package is created *private*.
# Make it public once at:
#   github.com/users/<owner>/packages/container/<repo>/settings  -> Danger Zone
# After that, Unraid pulls it with no authentication.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name for GHCR automatically.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
