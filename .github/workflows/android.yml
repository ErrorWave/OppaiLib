name: Build Android APK

# Builds the sideloadable OppaiLib APK.
#
#   push / manual run  ->  debug APK, uploaded as a workflow artifact
#   git tag vX.Y.Z     ->  release APK, signed and attached to the GitHub Release
#
# Debug APKs remain available as CI artifacts for testing. Tagged releases require
# the persistent signing key: publishing a runner-signed debug build as a release
# creates an installation that no future runner can update.
#
# ── Signing ────────────────────────────────────────────────────────────────
# Android will only update an installed app when the new APK is signed with the
# SAME key. The debug key is generated per build machine, so debug APKs are a
# dead end for updates. To publish real releases, create a keystore once:
#
#   keytool -genkeypair -v -keystore oppailib.jks -alias oppailib \
#           -keyalg RSA -keysize 4096 -validity 10000
#
# then add four repository secrets (Settings → Secrets → Actions):
#
#   ANDROID_KEYSTORE_BASE64    base64 -w0 oppailib.jks
#   ANDROID_KEYSTORE_PASSWORD  the keystore password
#   ANDROID_KEY_ALIAS          oppailib
#   ANDROID_KEY_PASSWORD       the key password
#
# Back up oppailib.jks somewhere safe. Losing it means you can never ship an
# update to an installed app again — only a fresh install after uninstalling.
# Without these secrets ordinary CI still builds a debug test artifact, while a
# tagged release stops with an actionable error.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write # needed to attach the APK to a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      # The Gradle wrapper jar is not committed, so there is no ./gradlew to run.
      # Pin the version the wrapper properties ask for and invoke gradle directly.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      # A tag drives the version so each release is installable over the last:
      # Android rejects an update whose versionCode is not strictly higher.
      # v1.4.2 -> versionName 1.4.2. Epoch seconds are shared across this workflow
      # and the Docker workflow; separate GITHUB_RUN_NUMBER sequences can go backwards
      # when a user moves between their APKs, which Android rejects as a downgrade.
      - name: Derive version
        id: version
        run: |
          name="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            name="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          # Identical commit => identical versionCode in every workflow. Using each
          # runner's wall clock made the server APK randomly older than the release
          # APK even though both came from the same source.
          code="$(git show -s --format=%ct HEAD)"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "APK version $name (code $code)" >> "$GITHUB_STEP_SUMMARY"

      # Decode the keystore only if it was configured. The output drives whether
      # the release APK below is signed, so a repo with no secrets still builds.
      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "A tagged APK must be signed with the persistent release key." >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No ANDROID_KEYSTORE_BASE64 secret — shipping the debug APK only." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > "${RUNNER_TEMP}/oppailib.jks"
          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "path=${RUNNER_TEMP}/oppailib.jks" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android
        env:
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: gradle --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: oppailib-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Release builds are minified (R8). That is exactly where a missing keep
      # rule turns into a crash the debug APK never shows, so build it on every
      # run — not just on tags — and find out here rather than on the phone.
      - name: Build release APK
        working-directory: android
        env:
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.code }}
          ANDROID_KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon assembleRelease

      - name: Verify signed release APK
        if: steps.keystore.outputs.present == 'true'
        run: $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk

      - name: Upload release APK
        if: steps.keystore.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: oppailib-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # On a tag, publish the APK as a release asset so it can be downloaded
      # straight onto the phone rather than dug out of a workflow run.
      - name: Attach APK to release
        if: github.ref_type == 'tag' && steps.keystore.outputs.present == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
