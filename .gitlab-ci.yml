# ── OppaiLib CI ─────────────────────────────────────────────────────────
# Builds the single-image Docker build and publishes it to the GitLab
# Container Registry so Unraid can pull a prebuilt image.
#
#   registry.gitlab.com/personalprojects3492627/oppailib
#
# Tagging:
#   - push to default branch  -> :latest  and  :<short-sha>
#   - git tag  vX.Y.Z         -> :vX.Y.Z  and  :latest
#
# Uses the predefined CI_REGISTRY* variables (already lowercased and
# authenticated for the job), so no manual secrets are required.

stages:
  - build

variables:
  # BuildKit for faster, cache-friendly multi-stage builds.
  DOCKER_BUILDKIT: "1"

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      # Choose tags based on what triggered the pipeline.
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG $CI_REGISTRY_IMAGE:latest"
      else
        TAGS="$CI_REGISTRY_IMAGE:latest $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      fi
      echo "Building tags: $TAGS"
      TAG_ARGS=""
      for t in $TAGS; do TAG_ARGS="$TAG_ARGS -t $t"; done
      docker build $TAG_ARGS .
      for t in $TAGS; do docker push "$t"; done
  rules:
    # Publish from the default branch and from version tags only.
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
